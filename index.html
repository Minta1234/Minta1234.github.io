<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minta's Project Links</title>

  <style>
    :root {
      --spin-time: 5.5s;
      --circle-size: clamp(240px, 80vmin, 480px);
      --circle-stroke: clamp(8px, 2.2vmin, 12px);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body, html {
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 24%),
                  radial-gradient(circle at 80% 25%, rgba(66,133,244,0.12), transparent 18%),
                  linear-gradient(180deg, #020202 0%, #070707 100%);
      margin: 0;
      padding: 8px;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* BG circles */
    .circles {
      height: var(--circle-size);
      width: var(--circle-size);
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      max-width: calc(100vw + 200px);
      max-height: calc(100vh + 200px);
    }

    .circle {
      box-sizing: border-box;
      position: absolute;
      width: 100%;
      height: 100%;
      border: var(--circle-stroke) solid transparent;
      border-radius: 115% 140% 145% 110% / 125% 140% 110% 125%;
      mix-blend-mode: screen;
    }

    .circle:nth-child(1) { border-color: #DB4437; animation: spin1 var(--spin-time) linear infinite; }
    .circle:nth-child(2) { border-color: #F4B400; animation: spin2 var(--spin-time) linear infinite; }
    .circle:nth-child(3) { border-color: #4285F4; animation: spin3 var(--spin-time) linear infinite; }
    .circle:nth-child(4) { border-color: #0F9D58; animation: spin4 var(--spin-time) linear infinite; }

    @keyframes spin1 { 0% { transform: rotate(0deg);    } 100% { transform: rotate(360deg);  } }
    @keyframes spin2 { 0% { transform: rotate(72deg);   } 100% { transform: rotate(-288deg); } }
    @keyframes spin3 { 0% { transform: rotate(-144deg); } 100% { transform: rotate(216deg);  } }
    @keyframes spin4 { 0% { transform: rotate(216deg);  } 100% { transform: rotate(-144deg); } }

    /* Content centered inside circle */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 1.2vmin, 12px);
      width: clamp(240px, 90vw, 420px);
      max-height: calc(100vh - 24px);
      padding: 14px;
      overflow: hidden;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #faf9f5;
      font-family: Arial, sans-serif;
      margin: 0 0 4px 0;
      font-size: clamp(0.9rem, 3vmin, 1.3rem);
      text-align: center;
    }

    button {
      width: 100%;
      padding: clamp(5px, 1.5vmin, 10px) 8px;
      cursor: pointer;
      font-weight: bold;
      font-family: Arial, sans-serif;
      font-size: clamp(0.65rem, 2vmin, 0.85rem);
      white-space: nowrap;
    }

    a {
      text-decoration: none;
      color: #faf9f5;
      width: 100%;
      display: block;
    }

    .link-button {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: clamp(10px, 1.5vmin, 14px) 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      color: #faf9f5;
      font-weight: bold;
      font-family: Arial, sans-serif;
      font-size: clamp(0.75rem, 2vmin, 0.95rem);
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease;
      white-space: normal;
      line-height: 1.3;
      text-align: center;
      min-height: 3rem;
    }

    .link-button:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }

    @media (max-width: 420px) {
      body, html {
        padding: 12px;
      }

      .content {
        width: min(100%, 95vw);
        max-height: calc(100vh - 32px);
        padding: 14px;
        gap: 10px;
      }

      h1 {
        font-size: 1rem;
      }

      .link-button {
        font-size: 0.85rem;
        padding: 10px 12px;
      }
    }
  </style>
</head>
<body>

  <canvas id="faviconCanvas" width="32" height="32" style="display:none"></canvas>

  <script>
    const canvas = document.getElementById('faviconCanvas');
    const ctx = canvas?.getContext?.('2d');
    const favicon = document.getElementById('favicon');
    const SIZE = 32, CX = 16, CY = 16, R = 13, STROKE = 3, SPEED = 5.5;
    const circles = [
      { color: '#DB4437', offset: 0 },
      { color: '#F4B400', offset: Math.PI * 2 * (72/360) },
      { color: '#4285F4', offset: Math.PI * 2 * (-144/360) },
      { color: '#0F9D58', offset: Math.PI * 2 * (216/360) },
    ];
    let start = null;
    function drawFavicon(ts) {
      if (!start) start = ts;
      const angle = ((ts - start) / 1000 / SPEED) * Math.PI * 2;
      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.globalCompositeOperation = 'screen';
      circles.forEach((c, i) => {
        const a = angle * (i % 2 === 0 ? 1 : -1) + c.offset;
        ctx.beginPath();
        ctx.arc(CX + Math.cos(a) * 1.5, CY + Math.sin(a) * 1.5, R, 0, Math.PI * 2);
        ctx.strokeStyle = c.color;
        ctx.lineWidth = STROKE;
        ctx.stroke();
      });
      ctx.globalCompositeOperation = 'source-over';
      favicon.href = canvas.toDataURL('image/png');
      requestAnimationFrame(drawFavicon);
    }
    if (canvas && ctx && favicon) {
      requestAnimationFrame(drawFavicon);
    } else {
      console.warn('Favicon animation skipped: canvas or favicon link unavailable.');
    }
  </script>

</body>
