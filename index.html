<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    :root {
      --spin-time: 5.5s;
      --circle-size: 55vmin;
      --circle-stroke: 2.5vmin;
    }

    body, html {
      background-color: black;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .circles {
      height: var(--circle-size);
      width: var(--circle-size);
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate3d(-50%, -50%, 0);
      z-index: 0;
      pointer-events: none;
    }

    .circle {
      box-sizing: border-box;
      position: absolute;
      width: 100%;
      height: 100%;
      border: var(--circle-stroke) solid transparent;
      border-radius: 115% 140% 145% 110% / 125% 140% 110% 125%;
      mix-blend-mode: screen;
    }

    .circle:nth-child(1) { border-color: #DB4437; animation: spin1 var(--spin-time) linear infinite; }
    .circle:nth-child(2) { border-color: #F4B400; animation: spin2 var(--spin-time) linear infinite; }
    .circle:nth-child(3) { border-color: #4285F4; animation: spin3 var(--spin-time) linear infinite; }
    .circle:nth-child(4) { border-color: #0F9D58; animation: spin4 var(--spin-time) linear infinite; }

    @keyframes spin1 { 0% { transform: rotate(0deg);    } 100% { transform: rotate(360deg);  } }
    @keyframes spin2 { 0% { transform: rotate(72deg);   } 100% { transform: rotate(-288deg); } }
    @keyframes spin3 { 0% { transform: rotate(-144deg); } 100% { transform: rotate(216deg);  } }
    @keyframes spin4 { 0% { transform: rotate(216deg);  } 100% { transform: rotate(-144deg); } }

    .content {
      position: fixed;
      top: 47%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: var(--circle-size);
    }

    h1 {
      color: #faf9f5;
      font-family: Arial, sans-serif;
      margin-bottom: 6px;
      font-size: 1.3rem;
      text-align: center;
    }

    button {
      width: 200px;
      padding: 8px;
      cursor: pointer;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }

    a {
      text-decoration: none;
      color: #faf9f5;
    }
  </style>
</head>
<body>

  <canvas id="faviconCanvas" width="32" height="32" style="display:none"></canvas>

  <script>
    const canvas = document.getElementById('faviconCanvas');
    const ctx = canvas.getContext('2d');
    const favicon = document.getElementById('favicon');
    const SIZE = 32;
    const CX = SIZE / 2;
    const CY = SIZE / 2;
    const R = 13;
    const STROKE = 3;
    const SPEED = 5.5; // seconds per revolution

    const circles = [
      { color: '#DB4437', offset: 0 },
      { color: '#F4B400', offset: Math.PI * 2 * (72 / 360) },
      { color: '#4285F4', offset: Math.PI * 2 * (-144 / 360) },
      { color: '#0F9D58', offset: Math.PI * 2 * (216 / 360) },
    ];

    let start = null;

    function drawFavicon(ts) {
      if (!start) start = ts;
      const elapsed = (ts - start) / 1000; // seconds
      const angle = (elapsed / SPEED) * Math.PI * 2;

      ctx.clearRect(0, 0, SIZE, SIZE);

      // black bg
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, SIZE, SIZE);

      ctx.globalCompositeOperation = 'screen';

      circles.forEach((c, i) => {
        const dir = i % 2 === 0 ? 1 : -1;
        const a = angle * dir + c.offset;

        // Offset center slightly like the CSS blob
        const ox = Math.cos(a) * 1.5;
        const oy = Math.sin(a) * 1.5;

        ctx.beginPath();
        ctx.arc(CX + ox, CY + oy, R, 0, Math.PI * 2);
        ctx.strokeStyle = c.color;
        ctx.lineWidth = STROKE;
        ctx.stroke();
      });

      ctx.globalCompositeOperation = 'source-over';

      favicon.href = canvas.toDataURL('image/png');
      requestAnimationFrame(drawFavicon);
    }

    requestAnimationFrame(drawFavicon);
  </script>
